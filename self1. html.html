<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html>
<head>
<title>Layout</title>
<style>

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

.container{
    width:350px;
    border:3px solid black;
    padding:10px;
}

.header{
    border:2px solid black;
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
}

.circle{
    width:40px;
    height:40px;
    border:2px solid black;
    border-radius:50%;
}

.content{
    display:flex;
    margin-top:10px;
    gap:10px;
}

.box{
    flex:1;
    height:200px;
    border:2px solid black;
}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <p>HEADER</p>
        <div class="circle"></div>
    </div>

    <div class="content">
        <div class="box">Content 1</div>
        <div class="box">Content 2</div>
    </div>

</div>

</body>
</html>
